version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gradia}
      POSTGRES_USER: ${POSTGRES_USER:-gradia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradia}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradia}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: atacetinel/gradia:latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - static_files:/app/staticfiles
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn gradia.wsgi:application --bind 0.0.0.0:8000 --workers 3 --worker-class gevent --worker-connections 50"

  nginx:
    image: atacetinel/gradia-nginx:latest
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - static_files:/app/staticfiles:ro
    restart: unless-stopped

volumes:
  postgres_data:
  static_files:
