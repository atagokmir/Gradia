<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş — Gradia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-violet-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-700 tracking-tight">Gradia</h1>
            <p class="text-gray-500 mt-1 text-sm">Grup Değerlendirme Sistemi</p>
        </div>

        <!-- Error -->
        {% if error %}
        <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
            {{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kullanıcı Adı</label>
                    <input type="text" name="username" value="{{ form.username.value|default:'' }}"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        placeholder="kullanici_adi" autofocus>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
                    <input type="password" name="password"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-sm">
                Giriş Yap
            </button>
        </form>
    </div>
    <p class="text-center text-gray-400 text-xs mt-4">© 2026 Gradia</p>
    <p class="text-center text-gray-400 text-xs mt-1">Ata Gökmir Çetinel tarafından MEF Üniversitesi için geliştirilmiştir</p>
</div>

</body>
</html>
