<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gradia{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-indigo-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <a href="{% url 'survey' %}" class="flex items-center gap-2">
                <span class="text-2xl font-bold tracking-tight">Gradia</span>
            </a>
            {% if user.is_authenticated %}
            <div class="flex items-center gap-4">
                {% if not user.is_staff %}
                <a href="{% url 'survey' %}" class="hover:text-indigo-200 text-sm font-medium">Anket</a>
                <a href="{% url 'profile' %}" class="hover:text-indigo-200 text-sm font-medium">Profil</a>
                {% else %}
                <a href="{% url 'dashboard' %}" class="hover:text-indigo-200 text-sm font-medium">Panel</a>
                {% endif %}
                <span class="text-indigo-200 text-sm">{{ user.get_full_name|default:user.username }}</span>
                <a href="{% url 'logout' %}" class="bg-indigo-800 hover:bg-indigo-900 px-3 py-1 rounded text-sm">Çıkış</a>
            </div>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Messages -->
{% if messages %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4">
    {% for message in messages %}
    <div class="mb-2 px-4 py-3 rounded-lg
        {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200
        {% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200
        {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800 border border-yellow-200
        {% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}

<main class="{% block main_class %}max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8{% endblock %}">
    {% block content %}{% endblock %}
</main>

</body>
</html>
